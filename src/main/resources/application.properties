spring.application.name=SpringBoot-JWT-UserManagement
server.port=9090

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate

demo.jwtSecret=${JWT_SECRET}
demo.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

demo.security.registration-enabled=${DEMO_REGISTRATION_ENABLED:false}
demo.security.swagger-enabled=${DEMO_SWAGGER_ENABLED:false}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db
